<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Aplicación de Métricas Deportivas</title>
  <!-- Enlace al archivo CSS -->
  <link rel="stylesheet" href="styles.css">
  <!-- Enlace a Chart.js desde CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <h1>Fitmonguers Sport Performanse</h1>

    <!-- Formulario para ingresar datos del atleta -->
    <form id="athleteForm">
      <h2>Rellena con tus PRs</h2>

      <!-- Nombre del atleta -->
      <label for="athleteName">Nombre:</label>
      <input type="text" id="athleteName" name="athleteName" required><br><br>

      <!-- Peso Corporal -->
      <label for="bodyWeight">Peso Corporal (kg):</label>
      <input type="number" id="bodyWeight" name="bodyWeight" required><br><br>

      <!-- Género -->
      <label for="gender">Género:</label>
      <select id="gender" name="gender" required>
        <option value="" disabled selected>Selecciona tu género</option>
        <option value="male">Hombre</option>
        <option value="female">Mujer</option>
      </select><br><br>

      <!-- Métricas de Fuerza -->
      <label for="squat">Sentadilla (kg):</label>
      <input type="number" id="squat" name="squat" required><br><br>

      <!-- Press de Banca -->
      <label for="benchPress">Press de Banca (kg):</label>
      <input type="number" id="benchPress" name="benchPress" required><br><br>

      <!-- Nuevas Métricas -->
      <label for="deadlift">Peso Muerto (kg):</label>
      <input type="number" id="deadlift" name="deadlift" required><br><br>

      <label for="powerClean">Power Clean (kg):</label>
      <input type="number" id="powerClean" name="powerClean" required><br><br>

      <label for="militaryPress">Press Militar (kg):</label>
      <input type="number" id="militaryPress" name="militaryPress" required><br><br>

      <label for="snatch">Arranque (kg):</label>
      <input type="number" id="snatch" name="snatch" required><br><br>

      <!-- Botón para generar el gráfico -->
      <button type="submit">Generar Gráfico</button>
    </form>

    <!-- Canvas para el gráfico -->
    <h2>Estás relativamente fuerte Fitmonguer</h2>
    <div class="chart-container">
      <canvas id="metricsChart"></canvas>
    </div>
  </div>
  <!-- Enlace al archivo JavaScript -->
  <script src="app.js"></script>
</body>
</html>
